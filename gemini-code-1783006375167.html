<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Clicker Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0,242,254,0.5);
        }
        #score {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #fff700;
        }
        #diamond {
            font-size: 100px;
            cursor: pointer;
            transition: transform 0.1s ease;
            user-select: none;
            filter: drop-shadow(0 0 20px rgba(0,242,254,0.6));
        }
        #diamond:active {
            transform: scale(0.85);
        }
        p {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <h1>💎 DIAMOND CLICKER </h1>
    <div id="score">Score: 0</div>
    <div id="diamond">💎</div>
    <p>Tap the diamond to earn points!</p>

    <script>
        let score = 0;
        const scoreDisplay = document.getElementById('score');
        const diamondBtn = document.getElementById('diamond');

        diamondBtn.addEventListener('click', () => {
            score++;
            scoreDisplay.innerText = "Score: " + score;
        });
    </script>
</body>
</html>
